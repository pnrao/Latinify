<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 1em;
            font-family: system-ui;
            white-space: nowrap;
            border: 1px solid #ccc;
        }

        label {
            display: block;
            margin: 0.5em 0;
            cursor: pointer;
        }

        .script-name {
            display: inline-block;
            padding: 0 2px;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #ffffff;
            }

            input[type="checkbox"] {
                accent-color: #bb86fc;
            }
        }
    </style>
</head>

<body>
    <div style="margin-bottom: 0.5em;">
        <label style="display: inline; margin-right: 1em;">
            <input type="radio" name="scheme" id="scheme-itrans" value="itrans" checked>
            <span>ITRANS</span>
        </label>
        <label style="display: inline; margin-right: 1em;">
            <input type="radio" name="scheme" id="scheme-iso" value="iso">
            <span>ISO</span>
        </label>
        <label style="display: inline;">
            <input type="radio" name="scheme" id="scheme-ipa" value="ipa">
            <span>IPA</span>
        </label>
    </div>
    <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">
    <label>
        <input type="checkbox" id="arabic" checked>
        <span class="script-name transliterated-arabic">Arabic</span>
        <div style="font-size: 0.8em; color: gray; margin-left: 2em;">also Urdu, Persian, etc.</div>
    </label>
    <label>
        <input type="checkbox" id="bengali" checked>
        <span class="script-name transliterated-bengali">Bengali</span>
        <div style="font-size: 0.8em; color: gray; margin-left: 2em;">also Assamese, Chakma, etc.</div>
    </label>
    <label>
        <input type="checkbox" id="devanagari" checked>
        <span class="script-name transliterated-devanagari">Devanagari</span>
        <div style="font-size: 0.8em; color: gray; margin-left: 2em;">Hindi, Nepali, etc.</div>
    </label>
    <label>
        <input type="checkbox" id="gujarati" checked>
        <span class="script-name transliterated-gujarati">Gujarati</span>
    </label>
    <label>
        <input type="checkbox" id="gurmukhi" checked>
        <span class="script-name transliterated-gurmukhi">Gurmukhi</span>
    </label>
    <label>
        <input type="checkbox" id="kannada" checked>
        <span class="script-name transliterated-kannada">Kannada</span>
    </label>
    <label>
        <input type="checkbox" id="malayalam" checked>
        <span class="script-name transliterated-malayalam">Malayalam</span>
    </label>
    <label>
        <input type="checkbox" id="odia" checked>
        <span class="script-name transliterated-odia">Odia</span>
    </label>
    <label>
        <input type="checkbox" id="sinhala" checked>
        <span class="script-name transliterated-sinhala">Sinhala</span>
    </label>
    <label>
        <input type="checkbox" id="tamil" checked>
        <span class="script-name transliterated-tamil">Tamil</span>
    </label>
    <label>
        <input type="checkbox" id="telugu" checked>
        <span class="script-name transliterated-telugu">Telugu</span>
    </label>
    <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">
    <label>
        <input type="checkbox" id="flipRtl" checked>
        <span class="script-name">Flip Right-to-Left Pages</span>
        <div style="font-size: 0.8em; color: gray; margin-left: 2em;">May not work perfectly</div>
    </label>
    <label>
        <input type="checkbox" id="indicateScript" checked>
        <span class="script-name">Indicate Original Script</span>
    </label>
    <label>
        <input type="checkbox" id="showStats">
        <span class="script-name">Show Stats</span>
    </label>
    <script src="popup.js"></script>
</body>

</html>
